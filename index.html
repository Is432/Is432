<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash Advanced</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }

/* HOLD SCREEN (for ship + jump) */
.hold {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index: 1;
}

/* MODE BUTTON */
.modeBtn {
  position: fixed;
  bottom: 120px;
  right: 20px;
  z-index: 5;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  font-size: 14px;
  background: rgba(255,255,255,0.2);
  color: white;
  touch-action: none;
}

/* HUD */
.hud {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: Arial;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="hold"
     ontouchstart="hold=true"
     ontouchend="hold=false"
     onmousedown="hold=true"
     onmouseup="hold=false"></div>

<button class="modeBtn" onclick="toggleMode()">MODE</button>

<div class="hud" id="hud"></div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let speed = 7;
let gravity = 0.6;

let hold = false;
let mode = "cube"; // cube or ship

let player = {
  x: 100,
  y: 200,
  w: 25,
  h: 25,
  dy: 0
};

let platforms = [
  {x:0,y:c.height-40,w:3000,h:40},
  {x:300,y:300,w:120,h:20},
  {x:700,y:250,w:120,h:20},
  {x:1100,y:200,w:120,h:20}
];

let spikes = [
  {x:500,y:c.height-70,w:30,h:30},
  {x:900,y:c.height-70,w:30,h:30}
];

// 🌀 PORTALS (mode switch zones)
let portals = [
  {x:600,y:c.height-100,w:40,h:60,mode:"ship"},
  {x:1200,y:c.height-100,w:40,h:60,mode:"cube"}
];

let gameOver = false;
let score = 0;

function toggleMode(){
  mode = (mode === "cube") ? "ship" : "cube";
}

function crash(){
  gameOver = true;
  setTimeout(reset, 600);
}

function reset(){
  player.y = 200;
  player.dy = 0;
  gameOver = false;
  score = 0;
}

function update(){
  if(gameOver) return;

  score++;

  // auto scroll world
  player.x += 2;

  // MODE LOGIC
  if(mode === "cube"){
    player.dy += gravity;

    if(hold && player.y >= c.height-80){
      player.dy = -10;
    }

  } else if(mode === "ship"){
    if(hold) player.dy -= 0.7;
    else player.dy += 0.4;

    player.dy *= 0.95;
  }

  player.y += player.dy;

  // ground limit
  if(player.y > c.height-60) player.y = c.height-60;
  if(player.y < 0) player.y = 0;

  // platforms collision
  for(let p of platforms){
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      if(player.dy > 0){
        player.y = p.y - player.h;
        player.dy = 0;
      }
    }
  }

  // spikes
  for(let s of spikes){
    if(
      player.x < s.x+s.w &&
      player.x+player.w > s.x &&
      player.y < s.y+s.h &&
      player.y+player.h > s.y
    ){
      crash();
    }
  }

  // portals (mode switch zones)
  for(let p of portals){
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      mode = p.mode;
    }
  }
}

function drawSpike(x,y,w,h){
  ctx.fillStyle = "#ff00ff";
  ctx.beginPath();
  ctx.moveTo(x,y+h);
  ctx.lineTo(x+w/2,y);
  ctx.lineTo(x+w,y+h);
  ctx.closePath();
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  // platforms
  ctx.fillStyle = "#0f0";
  for(let p of platforms) ctx.fillRect(p.x,p.y,p.w,p.h);

  // spikes
  for(let s of spikes) drawSpike(s.x,s.y,s.w,s.h);

  // portals
  for(let p of portals){
    ctx.fillStyle = p.mode==="ship" ? "#00ffff" : "#ffff00";
    ctx.fillRect(p.x,p.y,p.w,p.h);
  }

  // player
  ctx.fillStyle = mode==="ship" ? "#00ffff" : "#ff4444";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // HUD
  document.getElementById("hud").innerHTML =
    "Mode: " + mode.toUpperCase() + "<br>Score: " + score;

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("CRASH!", c.width/2-80, c.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
