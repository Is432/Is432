<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fast Dash</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }

.hold {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div class="hold" ontouchstart="hold=true" ontouchend="hold=false" 
                 onmousedown="hold=true" onmouseup="hold=false"></div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let speed = 9; // ⚡ FAST
let gravity = 0.6;

let hold = false;
let mode = "cube"; // cube or ship

let player = {
  x: 100,
  y: 200,
  w: 25,
  h: 25,
  dy: 0
};

let spikes = [];
let frame = 0;
let gameOver = false;
let score = 0;

function spawnSpike() {
  let h = 30 + Math.random() * 40;

  spikes.push({
    x: c.width + 50,
    y: c.height - 40 - h,
    w: 30,
    h: h
  });
}

function reset() {
  player.y = 200;
  player.dy = 0;
  spikes = [];
  frame = 0;
  score = 0;
  gameOver = false;
  mode = "cube";
}

function crash() {
  gameOver = true;
  setTimeout(reset, 600);
}

function update() {
  if (gameOver) return;

  frame++;
  score++;

  // spawn spikes fast
  if (frame % 55 === 0) spawnSpike();

  // MODE SWITCH (simple auto-switch)
  if (score > 2000 && score < 4000) mode = "ship";
  else if (score >= 4000) mode = "cube";

  // movement
  if (mode === "cube") {
    player.dy += gravity;

    if (hold && player.y >= c.height - 80) {
      player.dy = -10;
    }

  } else if (mode === "ship") {
    if (hold) player.dy -= 0.8;
    else player.dy += 0.5;

    player.dy *= 0.95;
  }

  player.y += player.dy;

  // ground/ceiling limits
  if (player.y > c.height - 60) player.y = c.height - 60;
  if (player.y < 0) player.y = 0;

  // move spikes
  for (let s of spikes) {
    s.x -= speed;

    if (
      player.x < s.x + s.w &&
      player.x + player.w > s.x &&
      player.y < s.y + s.h &&
      player.y + player.h > s.y
    ) {
      crash();
    }
  }

  spikes = spikes.filter(s => s.x + s.w > 0);
}

function drawSpike(x, y, w, h) {
  ctx.fillStyle = "#ff00ff";
  ctx.beginPath();
  ctx.moveTo(x, y + h);
  ctx.lineTo(x + w/2, y);
  ctx.lineTo(x + w, y + h);
  ctx.closePath();
  ctx.fill();
}

function draw() {
  ctx.clearRect(0,0,c.width,c.height);

  // ground
  ctx.fillStyle = "#0f0";
  ctx.fillRect(0, c.height - 40, c.width, 40);

  // player
  ctx.fillStyle = mode === "ship" ? "#00ffff" : "#ff4444";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // spikes
  for (let s of spikes) {
    drawSpike(s.x, s.y, s.w, s.h);
  }

  // UI
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 30);
  ctx.fillText("Mode: " + mode.toUpperCase(), 20, 55);

  if (gameOver) {
    ctx.font = "40px Arial";
    ctx.fillText("CRASH!", c.width/2 - 80, c.height/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
