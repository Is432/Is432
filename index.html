<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Platformer</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas {
      display: block;
      background: skyblue;
    }
    .controls {
      position: fixed;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }
    button {
      font-size: 24px;
      padding: 20px;
      border-radius: 10px;
      border: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
  <div>
    <button ontouchstart="left=true" ontouchend="left=false">⬅️</button>
    <button ontouchstart="right=true" ontouchend="right=false">➡️</button>
  </div>
  <button ontouchstart="jump()">⬆️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// full screen canvas
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: 50,
  y: 200,
  w: 30,
  h: 30,
  dx: 0,
  dy: 0,
  gravity: 0.6,
  jumpPower: -12
};

let left = false;
let right = false;

let ground = canvas.height - 40;

function jump() {
  if (player.dy === 0) {
    player.dy = player.jumpPower;
  }
}

function update() {
  // movement
  if (left) player.dx = -4;
  else if (right) player.dx = 4;
  else player.dx = 0;

  player.x += player.dx;

  // gravity
  player.dy += player.gravity;
  player.y += player.dy;

  // ground collision
  if (player.y > ground - player.h) {
    player.y = ground - player.h;
    player.dy = 0;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // ground
  ctx.fillStyle = "green";
  ctx.fillRect(0, ground, canvas.width, 40);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
