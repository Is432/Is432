<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Game</title>
<style>
  body { margin: 0; overflow: hidden; background: skyblue; }
  canvas { display: block; }

  .controls {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
  }

  button {
    font-size: 24px;
    padding: 18px;
    border-radius: 10px;
    border: none;
    opacity: 0.7;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
  <div>
    <button ontouchstart="left=true" ontouchend="left=false">⬅️</button>
    <button ontouchstart="right=true" ontouchend="right=false">➡️</button>
  </div>
  <button ontouchstart="jump()">⬆️</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.6;
let scrollX = 0;

let player = {
  x: 50,
  y: 200,
  w: 30,
  h: 30,
  dx: 0,
  dy: 0,
  jumpPower: -12,
  alive: true
};

let left = false;
let right = false;

let ground = canvas.height - 40;

// 🪜 LEVEL
let platforms = [
  {x: 0, y: ground, w: 2000, h: 40},
  {x: 300, y: 300, w: 120, h: 20},
  {x: 600, y: 250, w: 120, h: 20},
  {x: 900, y: 200, w: 120, h: 20},
  {x: 1200, y: 250, w: 120, h: 20}
];

// 👾 ENEMIES
let enemies = [
  {x: 400, y: ground - 30, w: 30, h: 30, dir: 1},
  {x: 1000, y: ground - 30, w: 30, h: 30, dir: -1}
];

// 🏁 GOAL
let goal = {x: 1500, y: ground - 60, w: 30, h: 60};

function jump() {
  if (player.dy === 0 && player.alive) {
    player.dy = player.jumpPower;
  }
}

function restart() {
  player.x = 50;
  player.y = 200;
  player.dx = 0;
  player.dy = 0;
  player.alive = true;
  scrollX = 0;
}

function update() {
  if (!player.alive) return;

  // movement
  if (left) player.dx = -4;
  else if (right) player.dx = 4;
  else player.dx = 0;

  player.x += player.dx;

  player.dy += gravity;
  player.y += player.dy;

  // platform collision
  for (let p of platforms) {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y < p.y + p.h &&
      player.y + player.h > p.y
    ) {
      if (player.dy > 0) {
        player.y = p.y - player.h;
        player.dy = 0;
      }
    }
  }

  // enemies movement + collision
  for (let e of enemies) {
    e.x += e.dir * 2;

    if (e.x < 300 || e.x > 1200) e.dir *= -1;

    if (
      player.x < e.x + e.w &&
      player.x + player.w > e.x &&
      player.y < e.y + e.h &&
      player.y + player.h > e.y
    ) {
      player.alive = false;
      setTimeout(restart, 1000);
    }
  }

  // goal check
  if (
    player.x < goal.x + goal.w &&
    player.x + player.w > goal.x &&
    player.y < goal.y + goal.h &&
    player.y + player.h > goal.y
  ) {
    alert("🎉 Level Complete!");
    restart();
  }

  // camera scroll
  scrollX = player.x - 100;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-scrollX, 0);

  // player
  ctx.fillStyle = player.alive ? "red" : "gray";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // platforms
  ctx.fillStyle = "green";
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // enemies
  ctx.fillStyle = "purple";
  for (let e of enemies) {
    ctx.fillRect(e.x, e.y, e.w, e.h);
  }

  // goal
  ctx.fillStyle = "gold";
  ctx.fillRect(goal.x, goal.y, goal.w, goal.h);

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
