<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Platform Game</title>
<style>
body { margin:0; overflow:hidden; background:skyblue; }
canvas { display:block; }
.controls {
  position:fixed; bottom:10px; width:100%;
  display:flex; justify-content:space-between; padding:0 20px;
}
button { font-size:22px; padding:15px; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
  <div>
    <button ontouchstart="left=true" ontouchend="left=false">⬅️</button>
    <button ontouchstart="right=true" ontouchend="right=false">➡️</button>
  </div>
  <button ontouchstart="jump()">⬆️</button>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let player = {x:50,y:200,w:30,h:30,dy:0};
let gravity = 0.6;
let left=false,right=false;
let score=0;

let platforms=[
  {x:0,y:c.height-40,w:2000,h:40},
  {x:200,y:300,w:120,h:20},
  {x:450,y:250,w:120,h:20}
];

let coins=[
  {x:220,y:260,r:10,taken:false},
  {x:470,y:210,r:10,taken:false}
];

let enemies=[
  {x:600,y:c.height-70,w:30,h:30,dir:1}
];

function jump(){
  if(player.dy===0) player.dy=-12;
}

function update(){
  if(left) player.x-=4;
  if(right) player.x+=4;

  player.dy+=gravity;
  player.y+=player.dy;

  // platforms
  platforms.forEach(p=>{
    if(player.x<p.x+p.w && player.x+player.w>p.x &&
       player.y<p.y+p.h && player.y+player.h>p.y){
      if(player.dy>0){ player.y=p.y-player.h; player.dy=0; }
    }
  });

  // coins
  coins.forEach(c=>{
    if(!c.taken &&
      Math.hypot(player.x-c.x, player.y-c.y)<25){
      c.taken=true;
      score++;
    }
  });

  // enemies
  enemies.forEach(e=>{
    e.x+=e.dir*2;
    if(e.x<500||e.x>800)e.dir*=-1;

    if(player.x<e.x+e.w && player.x+player.w>e.x &&
       player.y<e.y+e.h && player.y+player.h>e.y){
      alert("You Died!");
      location.reload();
    }
  });

  if(player.y>c.height) location.reload();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle="red";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  ctx.fillStyle="green";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  ctx.fillStyle="gold";
  coins.forEach(c=>{ if(!c.taken){
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();
  }});

  ctx.fillStyle="purple";
  enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));

  ctx.fillStyle="black";
  ctx.fillText("Score: "+score,20,20);
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>

</body>
</html>
