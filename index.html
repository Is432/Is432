<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Dash Full Game</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
canvas { display:block; }

/* MENU */
.menu {
  position: fixed;
  width:100%; height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  background: radial-gradient(circle, #111, #000);
  z-index: 10;
}

.menu h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

.menu button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
}

/* controls */
.hold {
  position: fixed;
  width:100%; height:100%;
  top:0; left:0;
}

.modeBtn {
  position: fixed;
  bottom: 120px;
  right: 20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
}
</style>
</head>

<body>

<div class="menu" id="menu">
  <h1>🌈 Neon Dash</h1>
  <button onclick="startGame()">▶ Play</button>
</div>

<canvas id="game"></canvas>

<div class="hold"
ontouchstart="hold=true"
ontouchend="hold=false"
onmousedown="hold=true"
onmouseup="hold=false"></div>

<button class="modeBtn" onclick="toggleMode()">MODE</button>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4b9c1b5c8f.mp3" type="audio/mpeg">
</audio>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let music = document.getElementById("music");

let running = false;
let hold = false;
let mode = "cube";
let gravityDir = 1;

let cameraX = 0;
let speed = 5;
let gravity = 0.7;

let player = {x:100,y:200,w:25,h:25,dy:0};
let checkpointX = 100;

let particles = [];
let spikes = [];
let portals = [];
let speedZones = [];

let levelLength = 25000;

// generate level
for(let x=300; x<levelLength; x+=300){
  spikes.push({x:x,y:c.height-70,w:30,h:30});
}

portals.push({x:2000,y:c.height-100,w:40,h:60,type:"ship"});
portals.push({x:4000,y:c.height-100,w:40,h:60,type:"cube"});
portals.push({x:6000,y:c.height-100,w:40,h:60,type:"gravity"});

speedZones.push({x:5000,w:500,s:8});
speedZones.push({x:10000,w:500,s:10});

let gameOver = false;
let score = 0;

function startGame(){
  document.getElementById("menu").style.display = "none";
  running = true;

  // required for mobile audio
  music.play().catch(()=>{});
}

function toggleMode(){
  mode = (mode==="cube")?"ship":"cube";
}

function reset(){
  player.x = checkpointX;
  player.y = 200;
  player.dy = 0;
  gameOver = false;
}

function crash(){
  gameOver = true;

  for(let i=0;i<25;i++){
    particles.push({
      x:player.x,
      y:player.y,
      dx:(Math.random()-0.5)*8,
      dy:(Math.random()-0.5)*8,
      life:25
    });
  }

  setTimeout(reset,600);
}

function update(){
  if(!running) return;

  if(gameOver){
    updateParticles();
    return;
  }

  score++;
  player.x += speed;

  cameraX += (player.x - cameraX - 200)*0.1;

  for(let z of speedZones){
    if(player.x > z.x && player.x < z.x+z.w){
      speed = z.s;
    }
  }

  if(mode==="cube"){
    player.dy += gravity*gravityDir;

    if(hold && Math.abs(player.dy)<1){
      player.dy = -12*gravityDir;
    }
  } else {
    if(hold) player.dy -= 0.8*gravityDir;
    else player.dy += 0.5*gravityDir;

    player.dy *= 0.95;
  }

  player.y += player.dy;

  if(player.y > c.height-60){ player.y=c.height-60; player.dy=0; }
  if(player.y < 0){ player.y=0; player.dy=0; }

  for(let s of spikes){
    if(player.x<s.x+s.w && player.x+player.w>s.x &&
       player.y<s.y+s.h && player.y+player.h>s.y){
      crash();
    }
  }

  for(let p of portals){
    if(player.x<p.x+p.w && player.x+player.w>p.x &&
       player.y<p.y+p.h && player.y+player.h>p.y){
      if(p.type==="ship") mode="ship";
      if(p.type==="cube") mode="cube";
      if(p.type==="gravity") gravityDir*=-1;

      checkpointX = p.x;
    }
  }

  particles.push({
    x:player.x,
    y:player.y,
    dx:(Math.random()-0.5)*2,
    dy:(Math.random()-0.5)*2,
    life:20
  });

  updateParticles();
}

function updateParticles(){
  for(let p of particles){
    p.x += p.dx;
    p.y += p.dy;
    p.life--;
  }
  particles = particles.filter(p=>p.life>0);
}

function glow(color){
  ctx.shadowBlur = 20;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  let grad = ctx.createLinearGradient(0,0,0,c.height);
  grad.addColorStop(0,"#000");
  grad.addColorStop(1,"#111");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,c.width,c.height);

  glow("#ff00ff");
  for(let s of spikes){
    ctx.beginPath();
    ctx.moveTo(s.x-cameraX,s.y+s.h);
    ctx.lineTo(s.x-cameraX+s.w/2,s.y);
    ctx.lineTo(s.x-cameraX+s.w,s.y+s.h);
    ctx.closePath();
    ctx.fill();
  }

  for(let p of portals){
    glow(p.type==="ship"?"#00ffff":"#ffff00");
    ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
  }

  for(let p of particles){
    ctx.fillStyle="white";
    ctx.fillRect(p.x-cameraX,p.y,2,2);
  }

  glow(mode==="ship"?"#00ffff":"#ff4444");
  ctx.fillRect(player.x-cameraX,player.y,player.w,player.h);

  ctx.shadowBlur = 0;

  ctx.fillStyle="white";
  ctx.fillText("Score: "+score,20,30);

  if(gameOver){
    ctx.font="40px Arial";
    ctx.fillText("CRASH!",c.width/2-80,c.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
