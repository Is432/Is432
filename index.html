<!DOCTYPE html>
<html>
<head>
  <title>My Platformer Game</title>
  <style>
    body { margin: 0; }
    canvas {
      display: block;
      margin: auto;
      background: skyblue;
    }
  </style>
</head>
<body>

<canvas id="game" width="600" height="300"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player = {
  x: 50,
  y: 200,
  w: 30,
  h: 30,
  dy: 0,
  gravity: 0.6,
  jump: -12
};

let platforms = [
  {x: 0, y: 270, w: 600, h: 30},
  {x: 200, y: 220, w: 100, h: 10},
  {x: 350, y: 180, w: 100, h: 10}
];

let keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function update() {
  player.dy += player.gravity;
  player.y += player.dy;

  // platform collision
  platforms.forEach(p => {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y < p.y + p.h &&
      player.y + player.h > p.y
    ) {
      if (player.dy > 0) {
        player.y = p.y - player.h;
        player.dy = 0;
      }
    }
  });

  // jump
  if (keys["Space"] && player.dy === 0) {
    player.dy = player.jump;
  }
}

function draw() {
  ctx.clearRect(0, 0, c.width, c.height);

  // player
  ctx.fillStyle = "red";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // platforms
  ctx.fillStyle = "green";
  platforms.forEach(p => {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
