<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Extreme Rhythm Dash</title>

<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }

.hold {
  position: fixed;
  width: 100%;
  height: 100%;
  top:0; left:0;
  z-index: 1;
}

.modeBtn {
  position: fixed;
  bottom: 120px;
  right: 20px;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  z-index: 5;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div class="hold"
ontouchstart="hold=true"
ontouchend="hold=false"
onmousedown="hold=true"
onmouseup="hold=false"></div>

<button class="modeBtn" onclick="toggleMode()">MODE</button>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let hold = false;
let mode = "cube";

let cameraX = 0;
let speed = 8; // ⚡ EXTREME SPEED
let gravity = 0.65;

let player = {
  x: 100,
  y: 200,
  w: 25,
  h: 25,
  dy: 0
};

// 🧱 20 LEVELS GENERATED
let levels = [];

for(let i=0;i<20;i++){
  let offset = i * 800;

  levels.push({
    spikes: [
      {x:offset+300,y:c.height-70,w:30,h:30},
      {x:offset+500,y:c.height-70,w:30,h:30},
      {x:offset+650,y:c.height-70,w:30,h:30}
    ],
    platforms: [
      {x:offset+0,y:c.height-40,w:800,h:40},
      {x:offset+350,y:300,w:120,h:20},
      {x:offset+600,y:250,w:120,h:20}
    ],
    portals: [
      {x:offset+450,y:c.height-100,w:40,h:60,mode:"ship"}
    ]
  });
}

let levelIndex = 0;
let gameOver = false;
let score = 0;

function toggleMode(){
  mode = (mode==="cube") ? "ship" : "cube";
}

function reset(){
  player.x = 100;
  player.y = 200;
  player.dy = 0;
  cameraX = 0;
  levelIndex = 0;
  gameOver = false;
  score = 0;
}

function crash(){
  gameOver = true;
  setTimeout(reset, 700);
}

function update(){
  if(gameOver) return;

  score++;
  player.x += 3; // auto run (rhythm feel)

  let lvl = levels[levelIndex];

  // LEVEL PROGRESSION
  if(player.x > (levelIndex+1)*800){
    levelIndex++;
    if(levelIndex >= levels.length){
      alert("YOU WIN ALL 20 LEVELS 🔥");
      reset();
      return;
    }
  }

  // CAMERA FOLLOWS PLAYER (FIXED)
  cameraX = player.x - 150;

  // MODE LOGIC
  if(mode==="cube"){
    player.dy += gravity;

    if(hold && player.y >= c.height-80){
      player.dy = -11;
    }
  } else {
    if(hold) player.dy -= 0.8;
    else player.dy += 0.5;

    player.dy *= 0.95;
  }

  player.y += player.dy;

  if(player.y > c.height-60) player.y = c.height-60;
  if(player.y < 0) player.y = 0;

  // COLLISIONS
  for(let s of lvl.spikes){
    if(
      player.x < s.x+s.w &&
      player.x+player.w > s.x &&
      player.y < s.y+s.h &&
      player.y+player.h > s.y
    ){
      crash();
    }
  }

  for(let p of lvl.portals){
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      mode = p.mode;
    }
  }

  for(let p of lvl.platforms){
    if(
      player.x < p.x+p.w &&
      player.x+player.w > p.x &&
      player.y < p.y+p.h &&
      player.y+player.h > p.y
    ){
      if(player.dy > 0){
        player.y = p.y - player.h;
        player.dy = 0;
      }
    }
  }
}

function drawSpike(x,y,w,h){
  ctx.fillStyle="#ff00ff";
  ctx.beginPath();
  ctx.moveTo(x-cameraX,y+h);
  ctx.lineTo(x-cameraX+w/2,y);
  ctx.lineTo(x-cameraX+w,y+h);
  ctx.closePath();
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  let lvl = levels[levelIndex];

  // platforms
  ctx.fillStyle="#0f0";
  for(let p of lvl.platforms){
    ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
  }

  // spikes
  for(let s of lvl.spikes){
    drawSpike(s.x,s.y,s.w,s.h);
  }

  // portals
  for(let p of lvl.portals){
    ctx.fillStyle = p.mode==="ship" ? "#00ffff" : "#ffff00";
    ctx.fillRect(p.x-cameraX,p.y,p.w,p.h);
  }

  // player
  ctx.fillStyle = mode==="ship" ? "#00ffff" : "#ff4444";
  ctx.fillRect(player.x-cameraX,player.y,player.w,player.h);

  // UI
  ctx.fillStyle="white";
  ctx.font="18px Arial";
  ctx.fillText("Level: "+(levelIndex+1)+"/20",20,30);
  ctx.fillText("Mode: "+mode.toUpperCase(),20,55);
  ctx.fillText("Score: "+score,20,80);

  if(gameOver){
    ctx.font="40px Arial";
    ctx.fillText("CRASH!", c.width/2-80,c.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
