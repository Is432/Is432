<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dash Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
}

canvas {
  display: block;
}

/* tap anywhere overlay */
.tap {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div class="tap" ontouchstart="jump()" onclick="jump()"></div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let gravity = 0.7;
let speed = 6;

let player = {
  x: 80,
  y: c.height - 120,
  w: 30,
  h: 30,
  dy: 0,
  grounded: false
};

let obstacles = [];
let frame = 0;
let gameOver = false;
let score = 0;

function spawnObstacle() {
  obstacles.push({
    x: c.width + 50,
    y: c.height - 80,
    w: 30,
    h: 50
  });
}

function jump() {
  if (player.grounded && !gameOver) {
    player.dy = -14;
    player.grounded = false;
  }

  if (gameOver) {
    restart();
  }
}

function restart() {
  player.y = c.height - 120;
  player.dy = 0;
  obstacles = [];
  score = 0;
  frame = 0;
  gameOver = false;
}

function update() {
  if (gameOver) return;

  frame++;
  score += 1;

  // spawn obstacles
  if (frame % 90 === 0) {
    spawnObstacle();
  }

  // player physics
  player.dy += gravity;
  player.y += player.dy;

  if (player.y + player.h >= c.height - 40) {
    player.y = c.height - 40 - player.h;
    player.dy = 0;
    player.grounded = true;
  }

  // move obstacles
  for (let o of obstacles) {
    o.x -= speed;

    // collision
    if (
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < o.y + o.h &&
      player.y + player.h > o.y
    ) {
      gameOver = true;
    }
  }

  // remove off-screen
  obstacles = obstacles.filter(o => o.x + o.w > 0);
}

function draw() {
  ctx.clearRect(0, 0, c.width, c.height);

  // ground
  ctx.fillStyle = "#0f0";
  ctx.fillRect(0, c.height - 40, c.width, 40);

  // player
  ctx.fillStyle = "#ff0055";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // obstacles
  ctx.fillStyle = "#00ffff";
  for (let o of obstacles) {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  }

  // score
  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 30);

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", c.width/2 - 120, c.height/2);
    ctx.font = "20px Arial";
    ctx.fillText("Tap to restart", c.width/2 - 80, c.height/2 + 40);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
